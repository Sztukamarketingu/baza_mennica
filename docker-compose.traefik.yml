services:
  app:
    build: .
    image: baza-mennica-app:latest
    container_name: baza-mennica-app
    restart: unless-stopped
    env_file:
      - path: app.env
        format: raw
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      SECURE_COOKIE: "true"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./backups:/app/backups
    labels:
      - traefik.enable=true
      - traefik.http.routers.baza-mennica.rule=Host(`baza-mennica.aikuznia.cloud`)
      - traefik.http.routers.baza-mennica.entrypoints=websecure
      - traefik.http.routers.baza-mennica.tls=true
      - traefik.http.routers.baza-mennica.tls.certresolver=mytlschallenge
      - traefik.http.services.baza-mennica.loadbalancer.server.port=3000
      - traefik.docker.network=root_default
    networks:
      - root_default
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  root_default:
    external: true
